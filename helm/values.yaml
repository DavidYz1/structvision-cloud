nameOverride: ""
fullnameOverride: ""

frontend:
  replicaCount: 1

  image:
    repository: mamt2-frontend
    tag: v1
    pullPolicy: IfNotPresent

  containerPort: 80

  service:
    type: ClusterIP
    port: 80
    targetPort: 80

  readinessProbe:
    path: /
    initialDelaySeconds: 2
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 6

  livenessProbe:
    path: /
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

  resources: {}

backend:
  replicaCount: 1

  image:
    repository: mamt2-backend
    tag: v1
    pullPolicy: IfNotPresent

  containerPort: 8000

  service:
    type: ClusterIP
    port: 8000
    targetPort: 8000

  config:
    useRealMamt2: "true"
    workerUrl: "http://mamt2-worker:9000"

  readinessProbe:
    path: /
    initialDelaySeconds: 2
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 6

  livenessProbe:
    path: /
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

  resources: {}

worker:
  replicaCount: 1

  image:
    repository: mamt2-worker
    tag: hf-v1
    pullPolicy: Never

  containerPort: 9000

  service:
    type: ClusterIP
    port: 9000
    targetPort: http

  env:
    detectron2Root: /opt/venv/lib/python3.12/site-packages
    mainDir: /app/worker/mamt2_runtime
    configPath: /app/model/config.yaml

  model:
    repository: DavidYz/structvision-spalling
    revision: 0b33cdd893b789316ee0a6ce5b5ccc639028c02d
    filename: model_best_segm.pth
    sha256: ea1a4e99731f7755598a59527ca782a30c48c08df57d6a61bcd5e95f377be0e2
    existingClaim: ""
    mountPath: /models
    weightPath: /models/model_best_segm.pth
    readOnly: true
    persistence:
      enabled: true
      accessModes:
        - ReadWriteOnce
      size: 2Gi
      storageClass: ""
    download:
      image:
        repository: curlimages/curl
        tag: 8.14.1
        pullPolicy: IfNotPresent
      url: https://huggingface.co/DavidYz/structvision-spalling/resolve/0b33cdd893b789316ee0a6ce5b5ccc639028c02d/model_best_segm.pth?download=true
      proxy:
        enabled: false
        httpProxy: ""
        httpsProxy: ""
        noProxy: "localhost,127.0.0.1,.svc,.cluster.local,10.96.0.0/12,10.244.0.0/16"

  output:
    mountPath: /outputs

  podSecurityContext:
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch

  containerSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    allowPrivilegeEscalation: false

  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "3"
      memory: 4Gi

  gpu:
    count: 1

  startupProbe:
    path: /healthz
    periodSeconds: 5
    failureThreshold: 60

  readinessProbe:
    path: /healthz
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

  livenessProbe:
    path: /healthz
    periodSeconds: 20
    timeoutSeconds: 3
    failureThreshold: 3

ingress:
  enabled: true
  className: nginx
  host: mamt2.test
  path: /
  pathType: Prefix

monitoring:
  serviceMonitor:
    enabled: true
    interval: 15s
    scrapeTimeout: 10s
    additionalLabels: {}

  grafanaDashboard:
    enabled: true
    label:
      key: grafana_dashboard
      value: "1"
