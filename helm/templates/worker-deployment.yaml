apiVersion: apps/v1
kind: Deployment
metadata:
  name: mamt2-worker
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.worker.replicaCount }}

  strategy:
    type: Recreate
    rollingUpdate: null
  selector:
    matchLabels:
      app: mamt2-worker

  template:
    metadata:
      labels:
        app: mamt2-worker

    spec:
      securityContext:
{{ toYaml .Values.worker.podSecurityContext | indent 8 }}

      initContainers:
        - name: model-weight-downloader
          image: "{{ .Values.worker.model.download.image.repository }}:{{ .Values.worker.model.download.image.tag }}@{{ .Values.worker.model.download.image.digest }}"
          imagePullPolicy: {{ .Values.worker.model.download.image.pullPolicy }}
          command:
            - /bin/sh
            - -ec
            - |
              set -eu

              expected_target="${MODEL_MOUNT_PATH%/}/${MODEL_FILENAME}"
              if [ "${MODEL_TARGET_PATH}" != "${expected_target}" ]; then
                echo "Model target path does not match mountPath/filename: ${MODEL_TARGET_PATH}" >&2
                exit 1
              fi

              case "${MODEL_URL}" in
                *"/resolve/${MODEL_REVISION}/${MODEL_FILENAME}"*) ;;
                *)
                  echo "Model URL is not pinned to revision ${MODEL_REVISION} and filename ${MODEL_FILENAME}" >&2
                  exit 1
                  ;;
              esac

              if [ -f "${MODEL_TARGET_PATH}" ] && \
                 printf '%s  %s\n' "${MODEL_SHA256}" "${MODEL_TARGET_PATH}" | sha256sum -c - >/dev/null 2>&1; then
                echo "Model weight checksum verified; skipping download: ${MODEL_TARGET_PATH}"
                exit 0
              fi

              if [ -e "${MODEL_TARGET_PATH}" ]; then
                echo "Existing model weight failed checksum validation; downloading a verified replacement"
              else
                echo "Model weight is absent; downloading pinned revision ${MODEL_REVISION}"
              fi

              temp_file="$(mktemp "${MODEL_TARGET_PATH}.part.XXXXXX")"
              trap 'rm -f "${temp_file}"' EXIT HUP INT TERM

              curl \
                --fail \
                --location \
                --show-error \
                --silent \
                --retry 5 \
                --retry-delay 2 \
                --retry-all-errors \
                --connect-timeout 30 \
                --output "${temp_file}" \
                "${MODEL_URL}"

              if ! printf '%s  %s\n' "${MODEL_SHA256}" "${temp_file}" | sha256sum -c -; then
                echo "Downloaded model weight failed SHA256 validation" >&2
                exit 1
              fi

              chmod 0444 "${temp_file}"
              mv -f "${temp_file}" "${MODEL_TARGET_PATH}"
              trap - EXIT HUP INT TERM
              echo "Model weight installed atomically: ${MODEL_TARGET_PATH}"
          env:
            - name: MODEL_REPOSITORY
              value: {{ .Values.worker.model.repository | quote }}
            - name: MODEL_REVISION
              value: {{ .Values.worker.model.revision | quote }}
            - name: MODEL_FILENAME
              value: {{ .Values.worker.model.filename | quote }}
            - name: MODEL_SHA256
              value: {{ .Values.worker.model.sha256 | quote }}
            - name: MODEL_URL
              value: {{ .Values.worker.model.download.url | quote }}
            - name: MODEL_MOUNT_PATH
              value: {{ .Values.worker.model.mountPath | quote }}
            - name: MODEL_TARGET_PATH
              value: {{ .Values.worker.model.weightPath | quote }}
{{- if .Values.worker.model.download.proxy.enabled }}
            - name: HTTP_PROXY
              value: {{ required "worker.model.download.proxy.httpProxy is required when worker.model.download.proxy.enabled=true" .Values.worker.model.download.proxy.httpProxy | quote }}
            - name: HTTPS_PROXY
              value: {{ required "worker.model.download.proxy.httpsProxy is required when worker.model.download.proxy.enabled=true" .Values.worker.model.download.proxy.httpsProxy | quote }}
            - name: NO_PROXY
              value: {{ .Values.worker.model.download.proxy.noProxy | quote }}
            - name: http_proxy
              value: {{ required "worker.model.download.proxy.httpProxy is required when worker.model.download.proxy.enabled=true" .Values.worker.model.download.proxy.httpProxy | quote }}
            - name: https_proxy
              value: {{ required "worker.model.download.proxy.httpsProxy is required when worker.model.download.proxy.enabled=true" .Values.worker.model.download.proxy.httpsProxy | quote }}
            - name: no_proxy
              value: {{ .Values.worker.model.download.proxy.noProxy | quote }}
{{- end }}
          securityContext:
{{ toYaml .Values.worker.containerSecurityContext | indent 12 }}
          volumeMounts:
            - name: model-storage
              mountPath: {{ .Values.worker.model.mountPath | quote }}
              readOnly: false

      containers:
        - name: worker
          image: "{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag }}"
          imagePullPolicy: {{ .Values.worker.image.pullPolicy }}

          ports:
            - name: http
              containerPort: {{ .Values.worker.containerPort }}
              protocol: TCP

          env:
            - name: MAMT2_DETECTRON2_ROOT
              value: {{ .Values.worker.env.detectron2Root | quote }}

            - name: MAMT2_MAIN_DIR
              value: {{ .Values.worker.env.mainDir | quote }}

            - name: MAMT2_CONFIG_PATH
              value: {{ .Values.worker.env.configPath | quote }}

            - name: MAMT2_WEIGHT_PATH
              value: {{ .Values.worker.model.weightPath | quote }}

            - name: MAMT2_OUTPUT_DIR
              value: {{ .Values.worker.output.mountPath | quote }}

          securityContext:
{{ toYaml .Values.worker.containerSecurityContext | indent 12 }}

          resources:
            requests:
{{ toYaml .Values.worker.resources.requests | indent 14 }}
            limits:
{{ toYaml .Values.worker.resources.limits | indent 14 }}
              nvidia.com/gpu: {{ .Values.worker.gpu.count }}

          volumeMounts:
            - name: model-storage
              mountPath: {{ .Values.worker.model.mountPath | quote }}
              readOnly: {{ .Values.worker.model.readOnly }}

            - name: output-storage
              mountPath: {{ .Values.worker.output.mountPath | quote }}

          startupProbe:
            httpGet:
              path: {{ .Values.worker.startupProbe.path }}
              port: http
            periodSeconds: {{ .Values.worker.startupProbe.periodSeconds }}
            failureThreshold: {{ .Values.worker.startupProbe.failureThreshold }}

          readinessProbe:
            httpGet:
              path: {{ .Values.worker.readinessProbe.path }}
              port: http
            periodSeconds: {{ .Values.worker.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.worker.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.worker.readinessProbe.failureThreshold }}

          livenessProbe:
            httpGet:
              path: {{ .Values.worker.livenessProbe.path }}
              port: http
            periodSeconds: {{ .Values.worker.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.worker.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.worker.livenessProbe.failureThreshold }}

      volumes:
        - name: model-storage
{{- if .Values.worker.model.existingClaim }}
          persistentVolumeClaim:
            claimName: {{ include "helm.workerModelClaimName" . }}
{{- else if .Values.worker.model.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "helm.workerModelClaimName" . }}
{{- else }}
          emptyDir: {}
{{- end }}

        - name: output-storage
          emptyDir: {}
