apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: mamt2
spec:
  replicas: 1

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
        - name: backend
          image: mamt2-backend:v1
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8000

          envFrom:
            - configMapRef:
                name: mamt2-config

          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6

          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: mamt2
  labels:
    app: backend
spec:
  type: ClusterIP

  selector:
    app: backend

  ports:
    - name: http
      port: 8000
      targetPort: 8000
