apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mamt2-ingress
  namespace: mamt2
spec:
  ingressClassName: nginx

  rules:
    - host: mamt2.test
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
