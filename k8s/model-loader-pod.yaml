apiVersion: v1
kind: Pod
metadata:
  name: mamt2-model-loader
  namespace: mamt2
spec:
  restartPolicy: Never
  containers:
    - name: loader
      image: busybox:1.36
      command:
        - sh
        - -c
        - sleep 3600
      volumeMounts:
        - name: model-storage
          mountPath: /models
  volumes:
    - name: model-storage
      persistentVolumeClaim:
        claimName: mamt2-model-pvc
