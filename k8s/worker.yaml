apiVersion: apps/v1
kind: Deployment
metadata:
  name: mamt2-worker
  namespace: mamt2
spec:
  replicas: 1

  selector:
    matchLabels:
      app: mamt2-worker

  template:
    metadata:
      labels:
        app: mamt2-worker

    spec:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

      containers:
        - name: worker
          image: mamt2-worker:dev
          imagePullPolicy: Never

          ports:
            - name: http
              containerPort: 9000
              protocol: TCP

          env:
            - name: MAMT2_DETECTRON2_ROOT
              value: /opt/detectron2

            - name: MAMT2_MAIN_DIR
              value: /opt/MAMT2_main

            - name: MAMT2_CONFIG_PATH
              value: /app/config/config_container.yaml

            - name: MAMT2_WEIGHT_PATH
              value: /models/model_best_segm.pth

            - name: MAMT2_OUTPUT_DIR
              value: /outputs

          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false

          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "3"
              memory: 4Gi
              nvidia.com/gpu: 1

          volumeMounts:
            - name: model-storage
              mountPath: /models
              readOnly: true

            - name: output-storage
              mountPath: /outputs

          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 60

          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3

      volumes:
        - name: model-storage
          persistentVolumeClaim:
            claimName: mamt2-model-pvc

        - name: output-storage
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: mamt2-worker
  namespace: mamt2
spec:
  selector:
    app: mamt2-worker

  ports:
    - name: http
      port: 9000
      targetPort: http
      protocol: TCP

  type: ClusterIP
